<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسرا تحبيني؟ 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e91e8c;
    --pink-light: #ff6eb4;
    --pink-pale: #ffd6e7;
    --rose: #ff4081;
    --soft: #fff0f6;
    --card-shadow: 0 32px 80px rgba(233,30,140,0.22), 0 8px 32px rgba(255,64,129,0.13);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    overflow: hidden;
    position: relative;
    background: #ffe4f0;
  }

  /* ─── Animated mesh background ─── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #ffb3d1 0%, transparent 55%),
      radial-gradient(ellipse at 80% 10%, #ffd6e7 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, #ffacc9 0%, transparent 55%),
      radial-gradient(ellipse at 10% 90%, #ffc8e0 0%, transparent 50%),
      #ffe4f0;
    animation: bgShift 8s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(15deg) brightness(1.04); }
  }

  /* ─── Floating particles ─── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .p {
    position: absolute;
    opacity: 0;
    animation: floatP linear infinite;
    user-select: none;
  }
  @keyframes floatP {
    0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; }
  }

  /* ─── Card wrapper ─── */
  .scene {
    perspective: 900px;
    z-index: 10;
    position: relative;
  }

  .card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 36px;
    padding: 44px 38px 40px;
    width: 340px;
    text-align: center;
    box-shadow: var(--card-shadow);
    border: 1.5px solid rgba(255,255,255,0.8);
    animation: cardEntrance 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    transform: scale(0) rotateY(-15deg);
    position: relative;
    overflow: hidden;
  }

  /* Shiny top edge */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    border-radius: 2px;
  }

  /* Subtle inner glow */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 36px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,180,210,0.18) 0%, transparent 65%);
    pointer-events: none;
  }

  @keyframes cardEntrance {
    0%   { transform: scale(0) rotateY(-15deg); opacity: 0; }
    60%  { transform: scale(1.06) rotateY(3deg); opacity: 1; }
    80%  { transform: scale(0.98) rotateY(-1deg); }
    100% { transform: scale(1) rotateY(0deg); opacity: 1; }
  }

  /* ─── Screens ─── */
  .screen { width: 100%; }
  .screen.hidden { display: none; }

  /* ─── Illustration ─── */
  .illus {
    font-size: 72px;
    display: block;
    margin-bottom: 14px;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(233,30,140,0.25));
    animation: illusBounce 2.2s ease-in-out infinite;
  }
  @keyframes illusBounce {
    0%,100% { transform: translateY(0) scale(1); }
    45%     { transform: translateY(-10px) scale(1.04); }
    55%     { transform: translateY(-10px) scale(1.04); }
  }

  /* ─── Name badge ─── */
  .name-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--pink), var(--rose));
    color: white;
    font-size: 13px;
    font-weight: 800;
    padding: 4px 16px;
    border-radius: 50px;
    margin-bottom: 14px;
    letter-spacing: 1.5px;
    box-shadow: 0 3px 12px rgba(233,30,140,0.35);
    animation: badgePulse 2s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%,100% { box-shadow: 0 3px 12px rgba(233,30,140,0.35); }
    50%     { box-shadow: 0 3px 22px rgba(233,30,140,0.6); }
  }

  /* ─── Question text ─── */
  .question {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.45;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #c2006b, #ff4081);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: 15px;
    color: #d87aaa;
    margin-bottom: 30px;
    font-weight: 600;
  }

  /* ─── Buttons ─── */
  .btns { display: flex; flex-direction: column; gap: 13px; }

  .btn-yes {
    background: linear-gradient(135deg, #ff6eb4, #e91e8c, #c2006b);
    background-size: 200% 200%;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-size: 20px;
    font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(233,30,140,0.45), 0 2px 8px rgba(233,30,140,0.3);
    transition: transform 0.18s, box-shadow 0.18s, background-position 0.4s;
    position: relative;
    overflow: hidden;
    animation: btnGlow 2.5s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%,100% { box-shadow: 0 8px 24px rgba(233,30,140,0.45), 0 2px 8px rgba(233,30,140,0.3); }
    50%     { box-shadow: 0 10px 35px rgba(233,30,140,0.65), 0 2px 12px rgba(233,30,140,0.4); }
  }
  .btn-yes::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
    border-radius: 50px;
  }
  .btn-yes:hover { transform: translateY(-4px) scale(1.04); }
  .btn-yes:active { transform: scale(0.96); }

  .btn-no {
    background: rgba(255,255,255,0.5);
    color: #d87aaa;
    border: 2px solid #f9a8d0;
    border-radius: 50px;
    padding: 13px 32px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  .btn-no:hover { background: #fff0f6; }

  /* No flee mode */
  .btn-no.fleeing {
    position: fixed;
    transition: left 0.12s cubic-bezier(.25,.46,.45,.94), top 0.12s cubic-bezier(.25,.46,.45,.94);
    z-index: 9999;
    animation: noBtnShake 0.3s ease;
  }
  @keyframes noBtnShake {
    0%,100% { transform: rotate(0); }
    25%     { transform: rotate(-5deg) scale(0.95); }
    75%     { transform: rotate(5deg) scale(0.95); }
  }

  /* ─── Progress bar (no attempts) ─── */
  .progress-wrap {
    margin-bottom: 22px;
    position: relative;
  }
  .progress-label {
    font-size: 12px;
    color: #d87aaa;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 7px;
    background: #ffd6e7;
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6eb4, #e91e8c);
    border-radius: 50px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px rgba(233,30,140,0.5);
  }

  /* ─── Answer screen ─── */
  #answerScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #answerScreen.show {
    display: flex;
    animation: answerIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes answerIn {
    0%   { opacity: 0; transform: scale(0.7) rotate(-8deg); }
    70%  { transform: scale(1.08) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .heart-big {
    font-size: 80px;
    animation: heartbeat 1.1s ease-in-out infinite;
    filter: drop-shadow(0 6px 18px rgba(233,30,140,0.45));
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%     { transform: scale(1.18); }
    28%     { transform: scale(1); }
    42%     { transform: scale(1.12); }
    56%     { transform: scale(1); }
  }

  .answer-title {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #c2006b, #ff4081);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.4;
  }

  .answer-msg {
    font-size: 15px;
    color: #d87aaa;
    font-weight: 600;
    line-height: 1.6;
    background: #fff0f6;
    padding: 12px 18px;
    border-radius: 18px;
    border: 1px solid #ffd6e7;
    width: 100%;
  }

  .love-meter {
    width: 100%;
    background: #ffd6e7;
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }
  .love-meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6eb4, #e91e8c, #c2006b);
    border-radius: 50px;
    transition: width 1.8s cubic-bezier(.4,0,.2,1) 0.3s;
    box-shadow: 0 0 10px rgba(233,30,140,0.6);
  }
  .love-meter-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #d87aaa;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .btn-reset {
    background: linear-gradient(135deg, #ff6eb4, #e91e8c);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 13px 30px;
    font-size: 17px;
    font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233,30,140,0.38);
    transition: transform 0.18s, box-shadow 0.18s;
    margin-top: 4px;
  }
  .btn-reset:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(233,30,140,0.5); }

  /* ─── Confetti ─── */
  .conf {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    top: -16px;
    animation: confDrop linear forwards;
    border-radius: 2px;
  }
  @keyframes confDrop {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* ─── Ripple on yes ─── */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ─── Tooltip on no ─── */
  .tooltip {
    position: fixed;
    background: #c2006b;
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 12px;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 4px 14px rgba(193,0,107,0.35);
  }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #c2006b;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="particles" id="particles"></div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<div class="scene">
  <div class="card" id="card">

    <!-- ══ SCREEN 1: Question ══ -->
    <div class="screen" id="mainScreen">
      <span class="illus">🐱💕🐱</span>
      <div class="name-badge">✨ اسرا ✨</div>
      <div class="question">تحبيني<br>لو لا ؟ 💝</div>
      <div class="sub">فكري مليح قبل تجاوبي 🥺</div>

      <!-- Progress bar -->
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-label">
          <span>محاولات الهروب 😏</span>
          <span id="progressText">0 / 5</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="btns">
        <button class="btn-yes" id="yesBtn" onclick="sayYes(event)">إيه طبعاً 💖</button>
        <button class="btn-no" id="noBtn"
          onmouseover="fleeNo(event)"
          ontouchstart="fleeNo(event)">لا 😒</button>
      </div>
    </div>

    <!-- ══ SCREEN 2: Answer ══ -->
    <div class="screen" id="answerScreen">
      <div class="heart-big">💗</div>
      <div class="answer-title">عرفت إنك تحبيني<br>من الأول 🥰</div>
      <div class="answer-msg">
        اسرا 💕 ما عندها خيار ثاني<br>
        القلب ما يكذب 😍✨
      </div>
      <div class="love-meter-label">
        <span>💖 مستوى الحب</span>
        <span id="meterPct">0%</span>
      </div>
      <div class="love-meter">
        <div class="love-meter-fill" id="loveBar"></div>
      </div>
      <button class="btn-reset" onclick="doReset()">ارجعي للسؤال 🔄</button>
    </div>

  </div>
</div>

<script>
/* ── Particles ── */
const pWrap = document.getElementById('particles');
const pItems = ['💕','💗','💖','💝','🌸','✨','💓','🩷','🌷','⭐','🎀'];
for (let i = 0; i < 22; i++) {
  const el = document.createElement('div');
  el.className = 'p';
  el.textContent = pItems[i % pItems.length];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.9 + Math.random() * 1.4) + 'rem';
  el.style.animationDuration = (6 + Math.random() * 9) + 's';
  el.style.animationDelay = (-Math.random() * 12) + 's';
  pWrap.appendChild(el);
}

/* ── Tooltip messages ── */
const taunts = [
  'وين رايحة؟ 😏','مو قادرة! 😂','تعالي هنا 🤭','الهروب ما ينفع 💅','راح تقولي إيه 😌','حاولي مرة ثانية 😁'];
let tIdx = 0;
const tooltip = document.getElementById('tooltip');

function showTooltip(btn, msg) {
  const r = btn.getBoundingClientRect();
  tooltip.textContent = msg;
  tooltip.classList.add('visible');
  tooltip.style.left = (r.left + r.width / 2 - tooltip.offsetWidth / 2) + 'px';
  tooltip.style.top  = (r.top - tooltip.offsetHeight - 10 + window.scrollY) + 'px';
  clearTimeout(tooltip._t);
  tooltip._t = setTimeout(() => tooltip.classList.remove('visible'), 900);
}

/* ── No button flee ── */
let noMoves = 0;
const MAX_NO = 5;

function fleeNo(e) {
  e && e.preventDefault();
  const btn = document.getElementById('noBtn');
  noMoves++;

  // Show progress bar
  const pw = document.getElementById('progressWrap');
  pw.style.display = 'block';
  document.getElementById('progressFill').style.width = (noMoves / MAX_NO * 100) + '%';
  document.getElementById('progressText').textContent = noMoves + ' / ' + MAX_NO;

  // Show tooltip
  const msg = taunts[Math.min(tIdx++, taunts.length - 1)];
  showTooltip(btn, msg);

  // Shrink the "no" button visually
  btn.style.fontSize = Math.max(12, 18 - noMoves * 1.2) + 'px';
  btn.style.padding  = `${Math.max(6,13 - noMoves)}px 20px`;
  btn.style.opacity  = Math.max(0.4, 1 - noMoves * 0.12);

  if (!btn.classList.contains('fleeing')) btn.classList.add('fleeing');

  const bw = btn.offsetWidth  || 120;
  const bh = btn.offsetHeight || 44;
  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = 12;
  const x = margin + Math.random() * (vw - bw - margin * 2);
  const y = margin + Math.random() * (vh - bh - margin * 2);
  btn.style.left = x + 'px';
  btn.style.top  = y + 'px';

  if (noMoves >= MAX_NO) {
    tooltip.classList.remove('visible');
    setTimeout(sayYes, 500);
  }
}

/* ── Say Yes ── */
function sayYes(e) {
  if (e) addRipple(document.getElementById('yesBtn'), e);
  tooltip.classList.remove('visible');

  // Hide no button
  const noBtn = document.getElementById('noBtn');
  noBtn.style.transition = 'opacity 0.3s, transform 0.3s';
  noBtn.style.opacity = '0';
  noBtn.style.transform = 'scale(0)';

  setTimeout(() => {
    document.getElementById('mainScreen').classList.add('hidden');
    const ans = document.getElementById('answerScreen');
    ans.classList.remove('hidden');
    ans.style.display = '';
    ans.classList.add('show');
    launchConfetti();
    animateMeter();
  }, 250);
}

function addRipple(btn, e) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size / 2) + 'px';
  r.style.top  = (e.clientY - rect.top  - size / 2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

/* ── Love meter ── */
function animateMeter() {
  const target = 95 + Math.floor(Math.random() * 5); // 95-99%
  const bar  = document.getElementById('loveBar');
  const pct  = document.getElementById('meterPct');
  bar.style.width = target + '%';
  let cur = 0;
  const iv = setInterval(() => {
    cur = Math.min(cur + 1, target);
    pct.textContent = cur + '%';
    if (cur >= target) clearInterval(iv);
  }, 18);
}

/* ── Confetti ── */
function launchConfetti() {
  const colors = ['#ff4081','#e91e8c','#f48fb1','#fce4ec','#ffb3c6',
                  '#fff176','#b2ff59','#80deea','#f8bbd0','#c2006b'];
  const shapes = ['50%','2px','0'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      const sz = 6 + Math.random() * 9;
      c.style.width  = sz + 'px';
      c.style.height = sz * (0.4 + Math.random() * 0.8) + 'px';
      c.style.left   = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
      c.style.animationDuration = (1.6 + Math.random() * 2.2) + 's';
      c.style.animationDelay    = (Math.random() * 0.4) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 22);
  }
}

/* ── Reset ── */
function doReset() {
  noMoves = 0; tIdx = 0;
  const noBtn = document.getElementById('noBtn');
  noBtn.classList.remove('fleeing');
  noBtn.style.cssText = '';

  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '0 / 5';
  document.getElementById('loveBar').style.width = '0%';
  document.getElementById('meterPct').textContent = '0%';

  const ans = document.getElementById('answerScreen');
  ans.classList.remove('show');
  ans.style.display = 'none';

  const main = document.getElementById('mainScreen');
  main.classList.remove('hidden');
  tooltip.classList.remove('visible');
}
</script>
</body>
</html>
